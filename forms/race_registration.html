<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Race Registration</title>
</head>
<body>
<h2>Race Registration</h2>
<form action="/dummy">
    <p>
    <label for="fname">First Name</label>
    <input type="text" id="fname" name="firstname" placeholder="Enter your first name">
    <label for="lname">Last Name</label>
    <input type="text" id="lname" name="lastname" placeholder="Enter your last name">
    </p>
    <p>Select a race:</p>
    <p>
        <input type="radio" id="fun" name="race">
        <label for="fun">Fun Run 5K</label>
    </p>
    <p>
        <input type="radio" id="half" name="race">
        <label for="half">Half Marathon</label>
    </p>
    <p>
        <input type="radio" id="full" name="race">
        <label for="full">Full Marathon</label>
    </p>
    <p>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email address">
        <label for="pass">Password</label>
        <input type="password" id="pass" name="password" placeholder="Enter your password">
    </p>
    <p>
        <label for="age">Select your age</label>
        <select name="age" id="age">
            <option value="Under 18">Under 18</option>
            <option value="19-25">19-25</option>
            <option value="26-30">26-30</option>
            <option value="31-35">31-35</option>
        </select>
    </p>
    <button>Register</button>
</form>
</body>
</html>
